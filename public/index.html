<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatteePro</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="start-page">

  <!-- 招待通知バナー -->
  <div id="inviteBanner" class="invite-banner hidden">
    <p id="inviteMsg" class="invite-banner-msg"></p>
    <button id="inviteJoinBtn" class="invite-banner-btn">参加する</button>
    <button id="inviteDismissBtn" class="invite-banner-dismiss">✕</button>
  </div>

  <div class="start-container">

    <div class="start-header">
      <h1>ChatteePro</h1>
      <p class="start-tagline">難聴者のためのAIエージェント</p>
      <p class="start-user-id">ユーザーID: <strong id="userIdDisplay"></strong></p>
    </div>

    <div class="start-buttons">
      <button id="startBtn" class="btn-start">トークを始める</button>
      <button id="joinBtn"  class="btn-join">トークに参加する</button>
    </div>

    <div class="start-footer">
      <a href="/terms.html">利用規約</a>
      <p>© 2026 Clearwater Corporation</p>
    </div>

  </div>

  <script type="module">
    import { supabase } from '/js/supabaseConfig.js';

    // User IDの取得（なければ自動生成してlocalStorageに保存）
    function getUserId() {
      let id = localStorage.getItem('chattee_user_id');
      if (!id) {
        id = Array.from({ length: 8 }, () => Math.floor(Math.random() * 10)).join('');
        localStorage.setItem('chattee_user_id', id);
      }
      return id;
    }

    const userId = getUserId();
    document.getElementById('userIdDisplay').textContent = userId;

    // トークを始める → talk_roomsにルーム作成 → room.htmlへ
    document.getElementById('startBtn').addEventListener('click', async () => {
      const { data, error } = await supabase
        .from('talk_rooms')
        .insert({ host_user_id: userId })
        .select('id')
        .single();

      if (error) {
        alert('ルームの作成に失敗しました。');
        console.error(error);
        return;
      }

      window.location.href = `/room.html?role=host&id=${data.id}`;
    });

    // トークに参加する → QRスキャン画面へ
    document.getElementById('joinBtn').addEventListener('click', () => {
      window.location.href = '/scan.html';
    });

    // 招待通知リスナー（個人チャンネル）
    let pendingRoomId = null;
    supabase
      .channel(`user:${userId}`)
      .on('broadcast', { event: 'invite' }, ({ payload }) => {
        pendingRoomId = payload.roomId;
        document.getElementById('inviteMsg').textContent =
          `${payload.fromUserId} さんからトークルームに招待されました`;
        document.getElementById('inviteBanner').classList.remove('hidden');
      })
      .subscribe();

    document.getElementById('inviteJoinBtn').addEventListener('click', () => {
      if (pendingRoomId) {
        window.location.href = `/room.html?role=guest&id=${pendingRoomId}`;
      }
    });

    document.getElementById('inviteDismissBtn').addEventListener('click', () => {
      document.getElementById('inviteBanner').classList.add('hidden');
      pendingRoomId = null;
    });

  </script>

</body>
</html>
